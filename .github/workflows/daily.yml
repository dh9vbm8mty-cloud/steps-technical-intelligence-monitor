name: Daily Technical Intelligence Monitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        run: |
          python src/main.py
          python src/weekly_report.py

      - name: Show generated files
        run: |
          ls -la reports || true
          ls -la data || true
          git status --short

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data
          git status --short
          git commit -m "Update STEPS technical intelligence reports" || echo "No changes to commit"
          git push